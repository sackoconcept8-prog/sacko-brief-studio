<svg width="640" height="220" viewBox="0 0 640 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="220" rx="38" fill="#050505"/>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="640" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5D282"/>
      <stop offset="0.45" stop-color="#D7A84D"/>
      <stop offset="1" stop-color="#8F6425"/>
    </linearGradient>
    <filter id="glow" x="-60" y="-60" width="760" height="340" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.84 0 1 0 0 0.63 0 0 1 0 0.22 0 0 0 0.55 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="110" cy="110" r="58" stroke="url(#gold)" stroke-width="3" opacity="0.85"/>
  <text x="110" y="127" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="900" fill="url(#gold)" letter-spacing="-5">SC</text>
  <text x="196" y="102" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="900" fill="url(#gold)" letter-spacing="4" filter="url(#glow)">SACKO</text>
  <text x="198" y="148" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700" fill="#D8C4A0" letter-spacing="8">CONCEPT</text>
  <line x1="198" y1="166" x2="510" y2="166" stroke="url(#gold)" stroke-width="2" opacity="0.7"/>
  <text x="198" y="190" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#A99F91" letter-spacing="5">DIGITAL STUDIO</text>
</svg>